<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Kingdom of Kings</title>
    <link rel="icon" type="image/png" href="https://kingdomofkings.vercel.app/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Prevent browser pinch-zoom ───────────────────────────────────── */
      body {
        touch-action: none;
        overscroll-behavior: none;
        overflow: hidden;
        background: #0a0608;
        font-family: 'Cinzel', serif;
      }
      #unity-canvas { touch-action: none; display: block; }

      /* ── Loading overlay ──────────────────────────────────────────────── */
      #loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0608;
        overflow: hidden;
        transition: opacity 0.8s ease, visibility 0.8s ease;
      }
      #loading-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Background art */
      #loading-bg {
        position: absolute;
        inset: 0;
        background: url('background.png') center center / cover no-repeat;
        filter: brightness(0.35) saturate(1.2);
      }

      /* Vignette */
      #loading-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 30%, #0a0608 90%);
      }

      /* Animated floating particles */
      .sparks {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .spark {
        position: absolute;
        bottom: -10px;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #f5c842;
        box-shadow: 0 0 6px 2px #f5c84299;
        animation: floatUp linear infinite;
        opacity: 0;
      }
      @keyframes floatUp {
        0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 0.6; }
        100% { transform: translateY(-110vh) translateX(var(--drift)) scale(0.3); opacity: 0; }
      }

      /* ── Content wrapper ──────────────────────────────────────────────── */
      #loading-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        padding: 0 24px;
      }

      /* Logo */
      #loading-logo {
        width: min(480px, 85vw);
        filter: drop-shadow(0 0 30px rgba(245, 200, 66, 0.5));
        animation: logoPulse 3s ease-in-out infinite;
      }
      @keyframes logoPulse {
        0%, 100% { filter: drop-shadow(0 0 20px rgba(245, 200, 66, 0.4)); }
        50%       { filter: drop-shadow(0 0 45px rgba(245, 200, 66, 0.75)); }
      }

      /* Ornament divider */
      .ornament {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 28px 0 20px;
        width: min(380px, 75vw);
      }
      .ornament-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(to right, transparent, #c9a227, transparent);
      }
      .ornament-diamond {
        width: 8px;
        height: 8px;
        background: #f5c842;
        transform: rotate(45deg);
        box-shadow: 0 0 8px #f5c842;
      }

      /* Loading label */
      #loading-label {
        font-family: 'Cinzel', serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #c9a227;
        margin-bottom: 16px;
        text-shadow: 0 0 12px rgba(201, 162, 39, 0.8);
        animation: textFlicker 4s ease-in-out infinite;
      }
      @keyframes textFlicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.75; }
      }

      /* Progress bar track */
      #progress-track {
        position: relative;
        width: min(420px, 80vw);
        height: 6px;
        background: rgba(255,255,255,0.08);
        border-radius: 999px;
        border: 1px solid rgba(201, 162, 39, 0.3);
        overflow: hidden;
      }

      /* Progress bar fill */
      #progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, #7a5500, #f5c842 50%, #ffe98a);
        transition: width 0.3s ease;
        position: relative;
      }

      /* Shimmer sweep on bar */
      #progress-fill::after {
        content: '';
        position: absolute;
        top: 0; right: 0; bottom: 0;
        width: 60px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
        animation: shimmer 1.4s linear infinite;
      }
      @keyframes shimmer {
        0%   { transform: translateX(-80px); }
        100% { transform: translateX(80px); }
      }

      /* Glow dot at leading edge */
      #progress-fill::before {
        content: '';
        position: absolute;
        right: -2px;
        top: 50%;
        transform: translateY(-50%);
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #fff8dc;
        box-shadow: 0 0 10px 4px #f5c842, 0 0 20px 6px rgba(245,200,66,0.4);
      }

      /* Percentage text */
      #progress-pct {
        font-family: 'Cinzel', serif;
        font-size: 13px;
        color: rgba(245, 200, 66, 0.7);
        margin-top: 14px;
        letter-spacing: 3px;
      }

      /* Tips carousel */
      #tip-box {
        margin-top: 40px;
        width: min(420px, 80vw);
        text-align: center;
        min-height: 44px;
      }
      #tip-text {
        font-family: 'Cinzel', serif;
        font-size: 12px;
        color: rgba(255, 235, 180, 0.55);
        letter-spacing: 1px;
        line-height: 1.7;
        animation: tipFade 0.6s ease;
      }
      @keyframes tipFade {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>

  <body>
    <!-- ── Premium loading overlay ──────────────────────────────────── -->
    <div id="loading-overlay">
      <div id="loading-bg"></div>

      <div class="sparks" id="sparks-container"></div>

      <div id="loading-content">
        <img id="loading-logo" src="logo.png" alt="Kingdom of Kings">

        <div class="ornament">
          <div class="ornament-line"></div>
          <div class="ornament-diamond"></div>
          <div class="ornament-line"></div>
        </div>

        <div id="loading-label">Loading Kingdom…</div>

        <div id="progress-track">
          <div id="progress-fill"></div>
        </div>

        <div id="progress-pct">0%</div>

        <div id="tip-box">
          <div id="tip-text"></div>
        </div>
      </div>
    </div>

    <!-- ── Unity canvas ─────────────────────────────────────────────── -->
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
    </div>

    <script>
      // ── Tips ──────────────────────────────────────────────────────────
      var tips = [
        "Build your castle to defend your realm.",
        "Train archers to guard your walls.",
        "Gold mines fuel your kingdom's growth.",
        "A mighty army starts with a single recruit.",
        "Wise kings plan before they build.",
        "Forge alliances — even kingdoms need allies.",
        "Every great empire began with one barracks.",
      ];
      var tipEl    = document.getElementById('tip-text');
      var tipIndex = Math.floor(Math.random() * tips.length);
      tipEl.textContent = tips[tipIndex];
      setInterval(function() {
        tipIndex = (tipIndex + 1) % tips.length;
        tipEl.style.animation = 'none';
        tipEl.offsetHeight; // reflow
        tipEl.style.animation = '';
        tipEl.textContent = tips[tipIndex];
      }, 4000);

      // ── Floating sparks ───────────────────────────────────────────────
      var sparksContainer = document.getElementById('sparks-container');
      for (var i = 0; i < 30; i++) {
        (function(idx) {
          var s = document.createElement('div');
          s.className = 'spark';
          var left  = Math.random() * 100;
          var dur   = 6 + Math.random() * 10;
          var delay = Math.random() * 12;
          var drift = (Math.random() - 0.5) * 120;
          var size  = 2 + Math.random() * 3;
          s.style.cssText = [
            'left:' + left + '%',
            'animation-duration:' + dur + 's',
            'animation-delay:' + delay + 's',
            'width:' + size + 'px',
            'height:' + size + 'px',
            '--drift:' + drift + 'px',
          ].join(';');
          sparksContainer.appendChild(s);
        })(i);
      }

      // ── Progress + hide overlay ───────────────────────────────────────
      var fillEl   = document.getElementById('progress-fill');
      var pctEl    = document.getElementById('progress-pct');
      var overlay  = document.getElementById('loading-overlay');

      function setProgress(p) {
        var pct = Math.round(p * 100);
        fillEl.style.width = pct + '%';
        pctEl.textContent  = pct + '%';
      }

      function hideOverlay() {
        overlay.classList.add('hidden');
        // Remove from DOM after transition ends so it doesn't block input
        overlay.addEventListener('transitionend', function() {
          overlay.remove();
        }, { once: true });
      }

      // ── Pinch-to-zoom prevention ──────────────────────────────────────
      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
      document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });

      // ── AudioParam NaN/Infinity guard ─────────────────────────────────
      (function patchAudioParam() {
        var proto      = AudioParam.prototype;
        var descriptor = Object.getOwnPropertyDescriptor(proto, 'value');
        if (!descriptor) return;
        var originalSet = descriptor.set;
        Object.defineProperty(proto, 'value', {
          get: descriptor.get,
          set: function(v) {
            if (!isFinite(v)) {
              console.warn('[AudioParam] Blocked non-finite value:', v);
              return;
            }
            originalSet.call(this, v);
          },
          enumerable:   descriptor.enumerable,
          configurable: descriptor.configurable,
        });
      })();

      // ── Unity canvas sizing ───────────────────────────────────────────
      var canvas = document.querySelector('#unity-canvas');
      canvas.style.width    = '100%';
      canvas.style.height   = '100%';
      canvas.style.position = 'fixed';
      canvas.style.top      = '0';
      canvas.style.left     = '0';

      document.body.style.textAlign = 'left';

      // ── Unity loader ──────────────────────────────────────────────────
      var buildUrl   = 'Build';
      var loaderUrl  = buildUrl + '/KOK.loader.js';
      var config = {
        dataUrl:           'Build/KOK.data',
        frameworkUrl:      'Build/KOK.framework.js',
        codeUrl:           'Build/KOK.wasm',
        streamingAssetsUrl: 'StreamingAssets',
        companyName:   "DefaultCompany",
        productName:   "KingdomofKings",
        productVersion:"1.0",
        showBanner: function(msg, type) {
          console[type === 'error' ? 'error' : 'warn']('[Unity]', msg);
        },
      };

      var script    = document.createElement('script');
      script.src    = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          setProgress(progress);
        }).then(function(unityInstance) {
          setProgress(1);
          setTimeout(hideOverlay, 400);
        }).catch(function(message) {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>

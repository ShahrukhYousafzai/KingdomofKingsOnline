<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity XNFT | KingdomofKings<</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
      /* Prevent browser pinch-zoom on the game canvas */
      body {
        touch-action: none;
        overscroll-behavior: none;
        overflow: hidden;
      }
      #unity-canvas {
        touch-action: none;
      }
    </style>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <script src="Build/KOK.loader.js"></script>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");
      
      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }
      
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/KOK.loader.js";
      var config = {
        dataUrl: "Build/KOK.data",
        frameworkUrl: "Build/KOK.framework.js",
        codeUrl: "Build/KOK.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "KingdomofKings",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };
      
      // ── Pinch-to-zoom prevention ────────────────────────────────────────────
      // Android Chrome 55+ ignores user-scalable=no in the meta viewport tag.
      // We must preventDefault on touchmove events with >1 pointer to block
      // the browser's native pinch-zoom, which sends bad delta values into
      // Unity and corrupts the AudioListener position (-> NaN AudioParam crash).
      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      // Also block gesturestart/gesturechange (Safari iOS)
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });

      // ── AudioParam NaN/Infinity guard ───────────────────────────────────────
      // Unity's _JS_Sound_SetPosition can pass non-finite floats to Web Audio
      // if the AudioListener's transform becomes invalid (e.g. after a zoom
      // gesture). We patch AudioParam.value to silently discard bad values
      // rather than throwing a fatal TypeError that crashes the Unity runtime.
      (function patchAudioParam() {
        var proto = AudioParam.prototype;
        var descriptor = Object.getOwnPropertyDescriptor(proto, 'value');
        if (!descriptor) return;
        var originalSet = descriptor.set;
        Object.defineProperty(proto, 'value', {
          get: descriptor.get,
          set: function(v) {
            if (!isFinite(v)) {
              console.warn('[AudioParam] Blocked non-finite value:', v);
              return;
            }
            originalSet.call(this, v);
          },
          enumerable: descriptor.enumerable,
          configurable: descriptor.configurable,
        });
      })();

      // Mobile device style: fill the whole browser client area with the game canvas:

      var canvas = document.querySelector("#unity-canvas");
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      canvas.style.position = "fixed";

      document.body.style.textAlign = "left";

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
